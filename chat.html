<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KAZZAH - Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a12;
            font-family: 'Rajdhani', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 520px;
            height: 100dvh;
            max-height: 100dvh;
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 200, 255, 0.12);
            box-shadow: 0 0 80px rgba(0, 180, 255, 0.06), inset 0 0 80px rgba(0, 180, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 180, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== HEADER ========== */
        .header {
            padding: 12px 16px;
            background: rgba(0, 20, 40, 0.6);
            border-bottom: 1px solid rgba(0, 200, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            min-height: 56px;
        }

        .header .left .title {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .header .right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header .right .user-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px 4px 14px;
            background: rgba(0, 200, 255, 0.06);
            border: 1px solid rgba(0, 200, 255, 0.08);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }

        .header .right .user-badge .owner-tag {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            font-size: 8px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
        }

        .header .right .btn-logout {
            padding: 4px 12px;
            border: 1px solid rgba(255, 71, 87, 0.2);
            background: rgba(255, 71, 87, 0.08);
            color: #ff6b7a;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .header .right .btn-logout:hover {
            background: rgba(255, 71, 87, 0.2);
            border-color: rgba(255, 71, 87, 0.4);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.1);
        }

        /* ========== DASHBOARD ========== */
        #dashboardPage {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            z-index: 1;
        }

        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .dashboard-content .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            color: rgba(0, 200, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 12px 0 8px;
            font-weight: 400;
        }

        .dashboard-content .group-card {
            background: rgba(0, 200, 255, 0.04);
            border: 1px solid rgba(0, 200, 255, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dashboard-content .group-card:hover {
            transform: translateX(4px);
            border-color: rgba(0, 200, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.04);
        }

        .dashboard-content .group-card h3 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .dashboard-content .group-card p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 2px;
        }

        .dashboard-content .group-card .member-count {
            font-size: 11px;
            color: rgba(0, 200, 255, 0.4);
            margin-top: 4px;
            display: block;
        }

        .dashboard-content .private-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dashboard-content .private-item:hover {
            background: rgba(0, 200, 255, 0.04);
            border-color: rgba(0, 200, 255, 0.1);
        }

        .dashboard-content .private-item .name {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .dashboard-content .private-item .badge {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
        }

        .dashboard-content .empty-text {
            color: rgba(255, 255, 255, 0.15);
            text-align: center;
            padding: 30px 0;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ========== CHAT PAGE ========== */
        #chatPage {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            z-index: 1;
        }

        .chat-header {
            padding: 10px 14px;
            background: rgba(0, 20, 40, 0.6);
            border-bottom: 1px solid rgba(0, 200, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            min-height: 48px;
            z-index: 2;
        }

        .chat-header .back-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
            transition: 0.3s;
        }

        .chat-header .back-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .chat-header .chat-title {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header .chat-title .owner-tag {
            font-size: 9px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            padding: 1px 10px;
            border-radius: 50px;
            margin-left: 6px;
            font-family: 'Orbitron', monospace;
        }

        .chat-header .info-btn {
            padding: 4px 12px;
            border: 1px solid rgba(0, 200, 255, 0.1);
            background: rgba(0, 200, 255, 0.04);
            color: rgba(0, 200, 255, 0.6);
            border-radius: 50px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chat-header .info-btn:hover {
            background: rgba(0, 200, 255, 0.08);
            border-color: rgba(0, 200, 255, 0.2);
        }

        /* ========== MESSAGES ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages .msg {
            max-width: 82%;
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 14px;
            word-wrap: break-word;
            position: relative;
            animation: msgIn 0.2s ease;
            color: #ffffff;
        }

        @keyframes msgIn {
            0% {
                opacity: 0;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-messages .msg.self {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.15), rgba(123, 47, 252, 0.12));
            border: 1px solid rgba(0, 200, 255, 0.08);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-messages .msg.other {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-messages .msg .sender {
            font-size: 11px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-messages .msg .sender .owner-label {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            font-size: 8px;
            padding: 1px 8px;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
        }

        .chat-messages .msg .time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 3px;
            text-align: right;
        }

        .chat-messages .msg .reply-ref {
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            border-left: 2px solid rgba(0, 200, 255, 0.3);
        }

        .chat-messages .msg .mention {
            color: #00d4ff;
            font-weight: 700;
            background: rgba(0, 200, 255, 0.1);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* ========== INPUT ========== */
        .chat-input {
            padding: 8px 12px;
            background: rgba(0, 20, 40, 0.6);
            border-top: 1px solid rgba(0, 200, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            z-index: 5;
            padding-bottom: env(safe-area-inset-bottom, 8px);
            position: relative;
        }

        .chat-input .reply-indicator {
            width: 100%;
            padding: 4px 12px;
            background: rgba(0, 200, 255, 0.04);
            border-radius: 10px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            display: none;
            justify-content: space-between;
            border: 1px solid rgba(0, 200, 255, 0.06);
        }

        .chat-input .reply-indicator .cancel-reply {
            color: #ff4757;
            cursor: pointer;
            font-weight: 700;
        }

        .chat-input .input-wrapper {
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 200, 255, 0.06);
            border-radius: 50px;
            padding: 2px 4px 2px 16px;
            transition: all 0.3s ease;
        }

        .chat-input .input-wrapper:focus-within {
            border-color: rgba(0, 200, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.04);
        }

        .chat-input .input-wrapper textarea {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: #ffffff;
            outline: none;
            font-size: 14px;
            font-family: 'Rajdhani', sans-serif;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
            min-height: 36px;
            width: 100%;
        }

        .chat-input .input-wrapper textarea::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }

        .chat-input .input-wrapper textarea::-webkit-scrollbar {
            width: 2px;
        }

        .chat-input .input-wrapper textarea::-webkit-scrollbar-thumb {
            background: rgba(0, 200, 255, 0.2);
            border-radius: 10px;
        }

        .chat-input .input-wrapper .send-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-shrink: 0;
            min-height: 36px;
        }

        .chat-input .input-wrapper .send-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.15);
        }

        .chat-input .input-wrapper .send-btn:active {
            transform: scale(0.95);
        }

        /* ========== MENTION POPUP ========== */
        .mention-popup {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 12px;
            right: 12px;
            background: rgba(10, 10, 30, 0.95);
            border: 1px solid rgba(0, 200, 255, 0.1);
            border-radius: 14px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 20;
            backdrop-filter: blur(10px);
            padding: 6px 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .mention-popup.show {
            display: block;
        }

        .mention-popup .mention-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .mention-popup .mention-item:hover {
            background: rgba(0, 200, 255, 0.06);
        }

        .mention-popup .mention-item .mention-username {
            font-weight: 600;
            color: #ffffff;
        }

        .mention-popup .mention-item .mention-owner {
            font-size: 9px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            padding: 1px 10px;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
        }

        .mention-popup .mention-empty {
            padding: 16px;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 99;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: rgba(10, 10, 30, 0.95);
            border: 1px solid rgba(0, 200, 255, 0.08);
            border-radius: 20px;
            padding: 24px 20px;
            max-width: 360px;
            width: 92%;
            max-height: 80%;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(0, 180, 255, 0.04);
        }

        .modal-box h3 {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            color: #fff;
            margin-bottom: 4px;
        }

        .modal-box .modal-sub {
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            margin-bottom: 14px;
        }

        .modal-box .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            color: #ffffff;
        }

        .modal-box .member-item:hover {
            background: rgba(0, 200, 255, 0.04);
        }

        .modal-box .member-item .owner-label {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            padding: 1px 10px;
            border-radius: 50px;
            font-size: 8px;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
        }

        .modal-box .member-item .chat-btn {
            padding: 3px 14px;
            border: 1px solid rgba(0, 200, 255, 0.1);
            background: rgba(0, 200, 255, 0.04);
            color: rgba(0, 200, 255, 0.6);
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .modal-box .member-item .chat-btn:hover {
            background: rgba(0, 200, 255, 0.08);
            border-color: rgba(0, 200, 255, 0.2);
        }

        .modal-box .close-modal {
            margin-top: 14px;
            padding: 10px;
            border: 1px solid rgba(255, 71, 87, 0.1);
            background: rgba(255, 71, 87, 0.04);
            color: #ff6b7a;
            border-radius: 50px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
        }

        .modal-box .close-modal:hover {
            background: rgba(255, 71, 87, 0.08);
            border-color: rgba(255, 71, 87, 0.2);
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 200, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 200, 255, 0.4);
        }

        @media (max-width: 540px) {
            .container {
                border-radius: 0;
                max-width: 100%;
            }
            .header .right .user-badge {
                font-size: 11px;
                padding: 3px 10px 3px 12px;
            }
            .chat-input .input-wrapper {
                padding: 2px 4px 2px 14px;
            }
            .chat-input .input-wrapper textarea {
                font-size: 13px;
                padding: 6px 0;
                min-height: 32px;
            }
            .chat-input .input-wrapper .send-btn {
                padding: 6px 16px;
                font-size: 9px;
                min-height: 32px;
            }
            .dashboard-content {
                padding: 10px 14px;
            }
            .modal-box {
                padding: 18px 16px;
            }
            .mention-popup {
                bottom: 55px;
                left: 8px;
                right: 8px;
                max-height: 150px;
            }
        }

        @media (max-width: 540px) {
            .container {
                height: 100dvh;
                max-height: 100dvh;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="left">
                <span class="title">✦ KAZZAH</span>
            </div>
            <div class="right">
                <span class="user-badge" id="headerBadge">
                    <span id="headerUsername">User</span>
                    <span class="owner-tag" id="headerOwnerTag" style="display:none;">⚡ OWNER</span>
                </span>
                <button class="btn-logout" id="logoutBtn">✕</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboardPage">
            <div class="dashboard-content" id="dashContent">
                <div class="section-title">▸ Group</div>
                <div class="group-card" id="groupCard">
                    <h3>🏠 Group Utama</h3>
                    <p id="groupDesc">Diskusi bebas KAZZAH</p>
                    <span class="member-count" id="groupMemberCount">⚡ 0 member</span>
                </div>

                <div class="section-title">▸ Private Chats</div>
                <div id="privateList">
                    <div class="empty-text">✦ No private chats yet</div>
                </div>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div id="chatPage">
            <div class="chat-header">
                <button class="back-btn" id="chatBackBtn">‹</button>
                <span class="chat-title" id="chatTitle">Group</span>
                <button class="info-btn" id="infoBtn">✦ INFO</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <div class="reply-indicator" id="replyIndicator">
                    <span>↩ Replying: <strong id="replyToName"></strong></span>
                    <span class="cancel-reply" id="cancelReplyBtn">✕</span>
                </div>
                <div class="input-wrapper">
                    <textarea id="chatInput" placeholder="Type @ to mention someone..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">SEND</button>
                </div>

                <!-- MENTION POPUP -->
                <div class="mention-popup" id="mentionPopup">
                    <div id="mentionList"></div>
                </div>
            </div>
        </div>

        <!-- MODAL INFO -->
        <div class="modal-overlay" id="infoModal">
            <div class="modal-box">
                <h3>✦ ALL USERS</h3>
                <div class="modal-sub">Click to start private chat</div>
                <div id="memberListContainer"></div>
                <button class="close-modal" id="closeModalBtn">CLOSE</button>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // 🔥 GANTI DENGAN URL VERCEL TUAN KALO UDAH DEPLOY 🔥
        // ============================================================
        const API_URL = 'http://localhost:3000/api';
        // Kalo udah deploy ke Vercel, ganti jadi: https://nama-project.vercel.app/api

        const GROUP_ID = 'groupUtama';
        const currentUser = JSON.parse(localStorage.getItem('kazzah_user'));

        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // ============================================================
        // STATE
        // ============================================================
        let currentChat = null;
        let currentReply = null;
        let mentionActive = false;
        let mentionUsers = [];
        let pollingInterval = null;

        // ============================================================
        // DOM REFS
        // ============================================================
        const headerUsername = document.getElementById('headerUsername');
        const headerOwnerTag = document.getElementById('headerOwnerTag');
        const logoutBtn = document.getElementById('logoutBtn');

        const dashboardPage = document.getElementById('dashboardPage');
        const chatPage = document.getElementById('chatPage');

        const groupCard = document.getElementById('groupCard');
        const groupDesc = document.getElementById('groupDesc');
        const groupMemberCount = document.getElementById('groupMemberCount');
        const privateList = document.getElementById('privateList');

        const chatBackBtn = document.getElementById('chatBackBtn');
        const chatTitle = document.getElementById('chatTitle');
        const infoBtn = document.getElementById('infoBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const replyIndicator = document.getElementById('replyIndicator');
        const replyToName = document.getElementById('replyToName');
        const cancelReplyBtn = document.getElementById('cancelReplyBtn');

        const infoModal = document.getElementById('infoModal');
        const memberListContainer = document.getElementById('memberListContainer');
        const closeModalBtn = document.getElementById('closeModalBtn');

        const mentionPopup = document.getElementById('mentionPopup');
        const mentionList = document.getElementById('mentionList');

        // ============================================================
        // AUTO-RESIZE TEXTAREA
        // ============================================================
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            handleMention();
        });

        // ============================================================
        // MENTION SYSTEM
        // ============================================================
        async function getGroupUsers() {
            try {
                const res = await fetch(`${API_URL}/group`);
                const group = await res.json();
                const members = group.members || [];
                const users = [];
                for (const email of members) {
                    const userRes = await fetch(`${API_URL}/users`);
                    const data = await userRes.json();
                    const user = data.users.find(u => u.email === email);
                    if (user) users.push(user);
                }
                return users;
            } catch (e) {
                return [];
            }
        }

        function handleMention() {
            if (currentChat !== 'group') {
                mentionPopup.classList.remove('show');
                mentionActive = false;
                return;
            }

            const text = chatInput.value;
            const cursorPos = chatInput.selectionStart;
            const beforeCursor = text.substring(0, cursorPos);
            const atIndex = beforeCursor.lastIndexOf('@');

            const charBeforeAt = atIndex > 0 ? text[atIndex - 1] : null;
            const isValidMention = atIndex !== -1 &&
                (charBeforeAt === null || charBeforeAt === ' ' || charBeforeAt === '\n');

            if (isValidMention) {
                const query = beforeCursor.substring(atIndex + 1).toLowerCase();

                getGroupUsers().then(users => {
                    const filtered = users.filter(u =>
                        u.email !== currentUser.email &&
                        u.username.toLowerCase().includes(query)
                    );

                    if (filtered.length > 0) {
                        mentionList.innerHTML = '';
                        filtered.forEach(user => {
                            const div = document.createElement('div');
                            div.className = 'mention-item';
                            div.innerHTML = `
                                <span class="mention-username">${user.username}</span>
                                ${user.isOwner ? '<span class="mention-owner">OWNER</span>' : ''}
                            `;
                            div.onclick = () => {
                                selectMention(user.username);
                            };
                            mentionList.appendChild(div);
                        });
                        mentionPopup.classList.add('show');
                        mentionActive = true;
                    } else {
                        mentionList.innerHTML = '<div class="mention-empty">No users found</div>';
                        mentionPopup.classList.add('show');
                        mentionActive = true;
                    }
                });
            } else {
                mentionPopup.classList.remove('show');
                mentionActive = false;
            }
        }

        function selectMention(username) {
            const text = chatInput.value;
            const cursorPos = chatInput.selectionStart;
            const beforeCursor = text.substring(0, cursorPos);
            const atIndex = beforeCursor.lastIndexOf('@');
            const afterCursor = text.substring(cursorPos);

            const newText = beforeCursor.substring(0, atIndex) + '@' + username + ' ' + afterCursor;
            chatInput.value = newText;
            chatInput.focus();
            const newPos = atIndex + username.length + 2;
            chatInput.setSelectionRange(newPos, newPos);
            mentionPopup.classList.remove('show');
            mentionActive = false;
            chatInput.dispatchEvent(new Event('input'));
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.mention-popup') && !e.target.closest('.input-wrapper')) {
                mentionPopup.classList.remove('show');
                mentionActive = false;
            }
        });

        chatInput.addEventListener('keydown', (e) => {
            if (!mentionActive) return;

            const items = mentionList.querySelectorAll('.mention-item');
            let currentIndex = -1;
            items.forEach((el, i) => {
                if (el.classList.contains('active')) {
                    currentIndex = i;
                    el.classList.remove('active');
                }
            });

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                const nextIndex = Math.min(currentIndex + 1, items.length - 1);
                if (items[nextIndex]) {
                    items[nextIndex].classList.add('active');
                    items[nextIndex].scrollIntoView({ block: 'nearest' });
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                const prevIndex = Math.max(currentIndex - 1, 0);
                if (items[prevIndex]) {
                    items[prevIndex].classList.add('active');
                    items[prevIndex].scrollIntoView({ block: 'nearest' });
                }
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                e.preventDefault();
                const activeItem = mentionList.querySelector('.mention-item.active');
                if (activeItem) {
                    const username = activeItem.querySelector('.mention-username').textContent;
                    selectMention(username);
                } else if (items.length > 0) {
                    const username = items[0].querySelector('.mention-username').textContent;
                    selectMention(username);
                }
            } else if (e.key === 'Escape') {
                mentionPopup.classList.remove('show');
                mentionActive = false;
            }
        });

        // ============================================================
        // HEADER
        // ============================================================
        headerUsername.textContent = currentUser.username;
        if (currentUser.isOwner) {
            headerOwnerTag.style.display = 'inline';
        }

        // ============================================================
        // LOGOUT
        // ============================================================
        logoutBtn.onclick = () => {
            if (confirm('Exit KAZZAH?')) {
                localStorage.removeItem('kazzah_user');
                window.location.href = 'index.html';
            }
        };

        // ============================================================
        // DASHBOARD
        // ============================================================
        function showDashboard() {
            dashboardPage.style.display = 'flex';
            chatPage.style.display = 'none';
            if (pollingInterval) clearInterval(pollingInterval);
            loadDashboard();
        }

        async function loadDashboard() {
            try {
                const groupRes = await fetch(`${API_URL}/group`);
                const group = await groupRes.json();
                groupDesc.textContent = group.description || 'Diskusi bebas KAZZAH';
                groupMemberCount.textContent = `⚡ ${(group.members || []).length} member`;
            } catch (e) {
                console.error('Load group error:', e);
            }
            loadPrivateChats();
        }

        async function loadPrivateChats() {
            try {
                const res = await fetch(`${API_URL}/private/chats?email=${currentUser.email}`);
                const data = await res.json();
                const chats = data.chats || [];

                if (chats.length === 0) {
                    privateList.innerHTML =
                        '<div class="empty-text">✦ No private chats yet<br><span style="font-size:11px;color:rgba(255,255,255,0.08);">Click info group to start</span></div>';
                    return;
                }

                privateList.innerHTML = '';
                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = 'private-item';
                    div.innerHTML = `
                        <span class="name">${chat.targetUsername} ${chat.targetIsOwner ? '⚡' : ''}</span>
                        <span class="badge">${chat.lastMessage}</span>
                    `;
                    div.onclick = () => openPrivateChat(chat.targetEmail);
                    privateList.appendChild(div);
                });
            } catch (e) {
                console.error('Load private chats error:', e);
            }
        }

        // ============================================================
        // GROUP CHAT
        // ============================================================
        groupCard.onclick = () => openGroupChat();

        function openGroupChat() {
            currentChat = 'group';
            dashboardPage.style.display = 'none';
            chatPage.style.display = 'flex';
            chatTitle.textContent = '🏠 Group Utama';
            infoBtn.style.display = 'inline-block';

            loadGroupMessages();
            chatInput.value = '';
            chatInput.style.height = 'auto';
            currentReply = null;
            replyIndicator.style.display = 'none';
            mentionPopup.classList.remove('show');
            startPolling();
            setTimeout(() => chatInput.focus(), 300);
        }

        async function loadGroupMessages() {
            try {
                const res = await fetch(`${API_URL}/group/messages`);
                const data = await res.json();
                chatMessages.innerHTML = '';
                (data.messages || []).forEach(msg => appendMessage(msg));
                scrollToBottom();
            } catch (e) {
                console.error('Load messages error:', e);
            }
        }

        // ============================================================
        // PRIVATE CHAT
        // ============================================================
        function openPrivateChat(targetEmail) {
            currentChat = targetEmail;
            dashboardPage.style.display = 'none';
            chatPage.style.display = 'flex';
            infoBtn.style.display = 'none';

            fetch(`${API_URL}/users`)
                .then(r => r.json())
                .then(data => {
                    const user = data.users.find(u => u.email === targetEmail);
                    if (user) {
                        chatTitle.textContent = `💌 ${user.username}`;
                        if (user.isOwner) {
                            chatTitle.innerHTML = `💌 ${user.username} <span class="owner-tag">⚡ OWNER</span>`;
                        }
                    } else {
                        chatTitle.textContent = '💌 Private Chat';
                    }
                });

            loadPrivateMessages(targetEmail);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            currentReply = null;
            replyIndicator.style.display = 'none';
            mentionPopup.classList.remove('show');
            startPolling();
            setTimeout(() => chatInput.focus(), 300);
        }

        async function loadPrivateMessages(targetEmail) {
            try {
                const res = await fetch(`${API_URL}/private/messages?email1=${currentUser.email}&email2=${targetEmail}`);
                const data = await res.json();
                chatMessages.innerHTML = '';
                (data.messages || []).forEach(msg => appendMessage(msg));
                scrollToBottom();
            } catch (e) {
                console.error('Load private messages error:', e);
            }
        }

        // ============================================================
        // POLLING (real-time sederhana)
        // ============================================================
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                if (chatPage.style.display !== 'flex') return;

                if (currentChat === 'group') {
                    try {
                        const res = await fetch(`${API_URL}/group/messages`);
                        const data = await res.json();
                        const currentMsgCount = chatMessages.querySelectorAll('.msg').length;
                        const newMsgCount = (data.messages || []).length;
                        if (newMsgCount !== currentMsgCount) {
                            chatMessages.innerHTML = '';
                            (data.messages || []).forEach(msg => appendMessage(msg));
                            scrollToBottom();
                        }
                    } catch (e) {}
                } else if (currentChat && currentChat !== 'group') {
                    try {
                        const res = await fetch(
                            `${API_URL}/private/messages?email1=${currentUser.email}&email2=${currentChat}`);
                        const data = await res.json();
                        const currentMsgCount = chatMessages.querySelectorAll('.msg').length;
                        const newMsgCount = (data.messages || []).length;
                        if (newMsgCount !== currentMsgCount) {
                            chatMessages.innerHTML = '';
                            (data.messages || []).forEach(msg => appendMessage(msg));
                            scrollToBottom();
                        }
                    } catch (e) {}
                }
            }, 2000);
        }

        // ============================================================
        // APPEND MESSAGE
        // ============================================================
        function appendMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.dataset.msgId = data.id;
            const isSelf = data.senderEmail === currentUser.email;
            if (isSelf) div.classList.add('self');
            else div.classList.add('other');

            const senderDiv = document.createElement('div');
            senderDiv.className = 'sender';
            senderDiv.textContent = data.senderUsername || 'Unknown';
            if (data.senderIsOwner) {
                const label = document.createElement('span');
                label.className = 'owner-label';
                label.textContent = '⚡ OWNER';
                senderDiv.appendChild(label);
            }
            div.appendChild(senderDiv);

            if (data.replyTo) {
                const replyDiv = document.createElement('div');
                replyDiv.className = 'reply-ref';
                replyDiv.innerHTML = `↩ <strong>${data.replyTo.sender}</strong>: ${data.replyTo.text}`;
                div.appendChild(replyDiv);
            }

            if (data.text) {
                const textP = document.createElement('p');
                let html = data.text;
                const mentionRegex = /@(\w+)/g;
                html = html.replace(mentionRegex, (match, username) => {
                    return `<span class="mention">@${username}</span>`;
                });
                textP.innerHTML = html;
                div.appendChild(textP);
            }

            const timeSpan = document.createElement('div');
            timeSpan.className = 'time';
            if (data.timestamp) {
                const d = new Date(data.timestamp);
                timeSpan.textContent = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            }
            div.appendChild(timeSpan);

            if (!isSelf) {
                div.style.cursor = 'pointer';
                div.onclick = () => {
                    currentReply = {
                        id: data.id,
                        sender: data.senderUsername || 'Unknown',
                        text: data.text || '[Media]'
                    };
                    replyIndicator.style.display = 'flex';
                    replyToName.textContent = currentReply.sender;
                };
            }

            chatMessages.appendChild(div);
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 100);
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const isGroup = currentChat === 'group';
            const targetEmail = isGroup ? null : currentChat;

            const msgData = {
                senderEmail: currentUser.email,
                senderUsername: currentUser.username,
                senderIsOwner: currentUser.isOwner,
                text: text,
                replyTo: currentReply ? {
                    id: currentReply.id,
                    sender: currentReply.sender,
                    text: currentReply.text
                } : null
            };

            try {
                let endpoint = isGroup ? `${API_URL}/group/message` : `${API_URL}/private/message`;
                let body = isGroup ? msgData : { ...msgData, targetEmail };

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const result = await response.json();
                if (result.success) {
                    appendMessage(result.message);
                    scrollToBottom();
                    if (!isGroup) loadPrivateChats();
                }
            } catch (e) {
                console.error('Send error:', e);
            }

            chatInput.value = '';
            chatInput.style.height = 'auto';
            currentReply = null;
            replyIndicator.style.display = 'none';
            mentionPopup.classList.remove('show');
            chatInput.focus();
        }

        sendBtn.onclick = sendMessage;

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !mentionActive) {
                e.preventDefault();
                sendMessage();
            }
        });

        cancelReplyBtn.onclick = () => {
            currentReply = null;
            replyIndicator.style.display = 'none';
        };

        // ============================================================
        // BACK TO DASHBOARD
        // ============================================================
        chatBackBtn.onclick = () => {
            if (pollingInterval) clearInterval(pollingInterval);
            showDashboard();
            loadPrivateChats();
        };

        // ============================================================
        // INFO GROUP
        // ============================================================
        infoBtn.onclick = () => {
            infoModal.classList.add('show');
            loadAllUsers();
        };

        async function loadAllUsers() {
            try {
                const res = await fetch(`${API_URL}/users`);
                const data = await res.json();
                const users = data.users || [];

                users.sort((a, b) => {
                    if (a.isOwner && !b.isOwner) return -1;
                    if (!a.isOwner && b.isOwner) return 1;
                    return a.username.localeCompare(b.username);
                });

                memberListContainer.innerHTML = '';
                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'member-item';
                    const isSelf = user.email === currentUser.email;
                    div.innerHTML = `
                        <span>${user.username} ${user.isOwner ? '⚡' : ''}</span>
                        <span>
                            ${user.isOwner ? '<span class="owner-label">OWNER</span>' : ''}
                            ${isSelf ? '<span style="color:rgba(255,255,255,0.15);font-size:10px;margin-left:4px;">(you)</span>' : ''}
                        </span>
                    `;
                    if (!isSelf) {
                        const chatBtn = document.createElement('button');
                        chatBtn.className = 'chat-btn';
                        chatBtn.textContent = '✦ CHAT';
                        chatBtn.onclick = (e) => {
                            e.stopPropagation();
                            infoModal.classList.remove('show');
                            openPrivateChat(user.email);
                        };
                        div.appendChild(chatBtn);
                        div.style.cursor = 'pointer';
                        div.onclick = () => {
                            infoModal.classList.remove('show');
                            openPrivateChat(user.email);
                        };
                    }
                    memberListContainer.appendChild(div);
                });
            } catch (e) {
                console.error('Load users error:', e);
            }
        }

        closeModalBtn.onclick = () => infoModal.classList.remove('show');
        infoModal.onclick = (e) => {
            if (e.target === infoModal) infoModal.classList.remove('show');
        };

        // ============================================================
        // INIT
        // ============================================================
        showDashboard();

        console.log('🔥 KAZZAH NEON + Upstash active, Yang Mulia!');
        console.log(`👑 Owner: ${currentUser.isOwner ? 'YES' : 'NO'}`);
    </script>

</body>
</html>
